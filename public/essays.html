<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>短文 · 生词云</title>
    <link rel="stylesheet" href="/css/tailwind.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* 弹窗 overlay */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }
      .modal-panel {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        width: min(900px, 94vw);
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #334155;
      }
      .modal-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        flex: 1;
        overflow: hidden;
      }
      @media (max-width: 640px) {
        .modal-body {
          grid-template-columns: 1fr;
        }
      }
      .modal-body.split .translation-panel {
        display: block;
      }
      .modal-body:not(.split) {
        grid-template-columns: 1fr;
      }
      .modal-body:not(.split) .translation-panel {
        display: none;
      }
      .text-panel {
        padding: 20px;
        overflow-y: auto;
        border-right: 1px solid #334155;
      }
      .translation-panel {
        padding: 20px;
        overflow-y: auto;
        display: block;
      }
      .text-panel:last-child {
        border-right: none;
      }
      .text-panel h3,
      .translation-panel h3 {
        margin: 0 0 12px 0;
        font-size: 13px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        position: sticky;
        top: 0;
        background: #1e293b;
        padding-bottom: 8px;
      }
      .text-content {
        white-space: pre-wrap;
        line-height: 1.8;
        font-size: 15px;
        color: #e2e8f0;
      }
      .modal-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        border-top: 1px solid #334155;
      }
      /* 列表标题可点击 */
      .essay-title-link {
        color: #e2e8f0;
        cursor: pointer;
        font-weight: 600;
        transition: color 0.15s;
      }
      .essay-title-link:hover {
        color: #818cf8;
      }
    </style>
  </head>
  <body class="bg-slate-900 text-slate-200 font-sans leading-relaxed">
    <header class="flex items-center justify-between px-6 py-3 bg-slate-800 border-b border-slate-700 sticky top-0 z-10">
      <div class="font-semibold text-base">生词云</div>
      <nav>
        <a href="/" class="mr-4 text-slate-400 text-sm hover:text-slate-200">词云</a>
        <a href="/manage.html" class="mr-4 text-slate-400 text-sm hover:text-slate-200">管理</a>
        <a href="/essays.html" class="text-slate-200 font-medium text-sm">短文</a>
      </nav>
      <div class="flex items-center gap-3 text-xs text-slate-400">
        <span id="user-label"></span>
        <button class="ghost" id="logout-btn">退出</button>
      </div>
    </header>

    <div class="max-w-[1200px] mx-auto p-6">
      <div class="grid grid-cols-[360px_1fr] gap-5 max-[880px]:grid-cols-1">
        <!-- 左侧表单 -->
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-5 shadow-lg">
          <h2 id="form-title" class="m-0 mb-4 text-base">录入短文</h2>
          <form id="essay-form">
            <input type="hidden" id="essay-id" />
            <div class="field">
              <label for="essay-title">标题 *</label>
              <input
                type="text"
                id="essay-title"
                class="mt-2 w-full bg-slate-800 text-slate-200 border border-slate-700 rounded-lg py-2 px-3 text-sm outline-none focus:border-indigo-500 transition-colors"
                maxlength="256"
                required
                autocomplete="off"
              />
            </div>
            <div class="field">
              <label for="essay-original">原文 *</label>
              <textarea
                id="essay-original"
                class="mt-2 w-full bg-slate-800 text-slate-200 border border-slate-700 rounded-lg py-2 px-3 text-sm outline-none focus:border-indigo-500 transition-colors resize-y"
                rows="8"
                required
              ></textarea>
            </div>
            <div class="field">
              <div class="flex items-center gap-x-2">
                <label for="essay-translation">译文</label>
                <button type="button" class="ghost text-xs py-1 px-2.5" id="form-translate-btn">🤖 AI 翻译</button>
              </div>
              <textarea
                id="essay-translation"
                class="mt-2 w-full bg-slate-800 text-slate-200 border border-slate-700 rounded-lg py-2 px-3 text-sm outline-none focus:border-indigo-500 transition-colors resize-y"
                rows="6"
              ></textarea>
            </div>
            <div class="flex gap-2">
              <button type="submit" id="submit-btn">录入</button>
              <button type="button" class="ghost hidden" id="reset-btn">
                取消编辑
              </button>
            </div>
          </form>
        </div>

        <!-- 右侧列表 -->
        <div>
          <div class="flex items-center gap-3 mb-3">
            <h2 class="m-0 text-base">我的短文</h2>
            <span id="count" class="text-slate-400 text-[13px]"></span>
            <button class="ghost text-xs py-1.5 px-3 ml-auto" id="refresh-btn">刷新</button>
          </div>
          <div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden max-h-[calc(100vh-200px)] overflow-y-auto">
            <table class="w-full border-collapse text-sm">
              <thead>
                <tr>
                  <th class="text-left py-[10px] px-3 border-b border-slate-700 font-medium text-slate-400 text-[13px] bg-slate-800 sticky top-0">标题</th>
                  <th class="text-left py-[10px] px-3 border-b border-slate-700 font-medium text-slate-400 text-[13px] bg-slate-800 sticky top-0 w-20">译文</th>
                  <th class="text-left py-[10px] px-3 border-b border-slate-700 font-medium text-slate-400 text-[13px] bg-slate-800 sticky top-0 w-[180px]">操作</th>
                </tr>
              </thead>
              <tbody id="essay-list">
                <tr>
                  <td colspan="3" class="text-center text-slate-400 py-8">加载中…</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" class="flex items-center justify-between gap-3 mt-3 text-sm text-slate-400"></div>
        </div>
      </div>
    </div>

    <!-- 查看弹窗 -->
    <div class="modal-overlay" id="view-modal">
      <div class="modal-panel">
        <div class="modal-header">
          <h3 id="modal-title" class="m-0 text-base font-semibold text-slate-200"></h3>
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1.5 text-xs text-slate-400 cursor-pointer select-none mb-0">
              <input type="checkbox" id="toggle-translation" class="w-4 h-4 cursor-pointer" />
              显示译文
            </label>
            <button class="ghost text-xs py-1 px-2" id="modal-edit-btn">编辑</button>
            <button class="ghost text-xs py-1 px-2" id="modal-close-btn">✕</button>
          </div>
        </div>
        <div class="modal-body" id="modal-body">
          <div class="text-panel">
            <h3>📄 原文</h3>
            <div class="text-content" id="modal-original"></div>
          </div>
          <div class="translation-panel">
            <h3>🌐 译文</h3>
            <div class="text-content" id="modal-translation"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="ghost text-xs py-1.5 px-3" id="modal-translate-btn">🤖 AI 翻译</button>
          <span id="modal-translate-status" class="text-xs text-slate-400"></span>
        </div>
      </div>
    </div>

    <script type="module" src="/js/essays.js"></script>
  </body>
</html>
