<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 · 生词云</title>
    <link rel="stylesheet" href="/css/tailwind.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-slate-900 text-slate-200 font-sans leading-relaxed">
    <div class="flex items-center justify-center min-h-screen p-6">
      <div class="w-full max-w-[380px] bg-slate-800 border border-slate-700 rounded-lg p-5 shadow-lg">
        <h1 class="m-0 mb-2 text-[22px]">生词云</h1>
        <p class="text-slate-400 text-[13px] mb-5">把背过的单词都堆成一片云</p>

        <div class="auth-tabs">
          <button data-tab="login" class="active">登录</button>
          <button data-tab="register">注册</button>
        </div>

        <form id="auth-form">
          <div class="field">
            <label for="username">用户名</label>
            <input
              type="text"
              id="username"
              name="username"
              class="w-full bg-slate-800 text-slate-200 border border-slate-700 rounded-lg py-2 px-3 text-sm outline-none focus:border-indigo-500 transition-colors"
              autocomplete="username"
              minlength="3"
              maxlength="32"
              required
            />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input
              type="password"
              id="password"
              name="password"
              class="w-full bg-slate-800 text-slate-200 border border-slate-700 rounded-lg py-2 px-3 text-sm outline-none focus:border-indigo-500 transition-colors"
              autocomplete="current-password"
              minlength="6"
              maxlength="64"
              required
            />
          </div>
          <button type="submit" class="w-full" id="submit-btn">登录</button>
        </form>
      </div>
    </div>

    <script type="module" src="/js/auth-page.js"></script>
  </body>
</html>
