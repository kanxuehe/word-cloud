<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生词云</title>
    <link rel="stylesheet" href="/css/tailwind.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body
    class="flex flex-col h-screen bg-slate-900 text-slate-200 font-sans leading-relaxed"
  >
    <header
      class="flex items-center justify-between px-6 py-3 bg-slate-800 border-b border-slate-700 sticky top-0 z-10"
    >
      <div class="font-semibold text-base">生词云</div>
      <nav>
        <a href="/" class="mr-4 text-slate-200 font-medium text-sm">词云</a>
        <a
          href="/manage.html"
          class="text-slate-400 text-sm hover:text-slate-200"
          >管理</a
        >
      </nav>
      <div class="flex items-center gap-3 text-xs text-slate-400">
        <span id="user-label"></span>
        <button class="ghost" id="logout-btn">退出</button>
      </div>
    </header>

    <div
      class="flex flex-wrap gap-3 items-center px-6 py-3 bg-slate-800 border-b border-slate-700"
    >
      <div class="flex items-center gap-2">
        <label class="text-xs text-slate-400 mb-0">显示</label>
        <div class="segmented" id="display-toggle">
          <button data-value="word" class="active">原词</button>
          <button data-value="translation">翻译</button>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <label class="text-xs text-slate-400 mb-0">筛选</label>
        <div class="segmented" id="filter-toggle">
          <button data-value="all" class="active">全部</button>
          <button data-value="unknown">未会</button>
          <button data-value="known">已会</button>
        </div>
      </div>
      <div>
        <label class="flex items-center gap-2 text-xs text-slate-400 mb-0">
          <input
            type="checkbox"
            id="dim-known"
            checked
            class="w-4 h-4 cursor-pointer"
          />
          已会单词淡化显示
        </label>
      </div>
      <div class="flex items-center gap-2 ml-auto">
        <button class="ghost" id="refresh-btn">刷新</button>
        <button id="goto-manage">添加单词</button>
      </div>
    </div>

    <div id="cloud" class="flex-1 relative bg-slate-900">
      <div
        class="absolute inset-0 flex items-center justify-center flex-col gap-3 text-slate-400"
        id="empty-tip"
        style="display: none"
      >
        <div>还没有单词，去管理页添加几个吧～</div>
        <a href="/manage.html"><button>立即添加</button></a>
      </div>
      <canvas id="cloud-canvas" class="block w-full h-full"></canvas>
      <div id="cloud-tooltip" class="cloud-tooltip"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.3/src/wordcloud2.js"></script>
    <script type="module" src="/js/cloud.js"></script>
  </body>
</html>
